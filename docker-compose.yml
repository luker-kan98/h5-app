version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:////data/h5app.db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - SECRET_KEY=change-me-in-production
      - BUILDS_DIR=/app/builds
      - REPO_ROOT=/workspace
    volumes:
      - ./builds:/app/builds
      - ./flutter-wrapper:/workspace/flutter-wrapper
      - db-data:/data
    depends_on:
      - redis

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.tasks.build_task.celery_app worker --loglevel=info --concurrency=2
    environment:
      - DATABASE_URL=sqlite:////data/h5app.db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - BUILDS_DIR=/app/builds
      - REPO_ROOT=/workspace
    volumes:
      - ./builds:/app/builds
      - ./flutter-wrapper:/workspace/flutter-wrapper
      - db-data:/data
    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  db-data:
