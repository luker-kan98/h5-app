worker_processes  1;
pid /tmp/h5-app-nginx.pid;
error_log /tmp/h5-app-nginx-error.log;

events {
    worker_connections  1024;
}

http {
    include       /opt/homebrew/etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    access_log    /tmp/h5-app-nginx-access.log;

    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_comp_level   5;
    gzip_proxied      any;
    gzip_types
        text/plain
        text/css
        text/xml
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        application/wasm
        image/svg+xml
        font/ttf
        font/otf
        font/woff
        font/woff2;

    # ---- Backend API: 80 / 443 (ops 域名解析到本机, 不带端口) ----
    server {
        listen 80 default_server;
        # 启用 HTTPS: 拿到证书后取消注释下面 4 行
        # listen 443 ssl default_server;
        # ssl_certificate     /etc/letsencrypt/live/<api-domain>/fullchain.pem;
        # ssl_certificate_key /etc/letsencrypt/live/<api-domain>/privkey.pem;
        # ssl_protocols TLSv1.2 TLSv1.3;

        server_name _;

        client_max_body_size 50m;

        location / {
            proxy_pass http://127.0.0.1:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }
    }

    # ---- maccms 官网静态站点 (从 80 迁到 8080) ----
    server {
        listen 8080;
        server_name app.maccms.cloud;
        root /Users/ec2-user/h5-app/maccms/out;
        index index.html;

        client_max_body_size 50m;

        # 站内 H5 封包页同源调用后端 API
        location ~ ^/(build|builds|rebuild|files|sdk-catalog)(/|$) {
            proxy_pass http://127.0.0.1:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        location / {
            try_files $uri $uri.html $uri/ /index.html;
        }
    }
}
